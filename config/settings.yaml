embedding:
  model: "all-MiniLM-L6-v2"
  # Cosine similarity threshold — articles below this score are dropped.
  # Range: 0.0 (anything passes) to 1.0 (exact match only).
  # 0.35 is a good starting point; raise to 0.40+ to tighten focus.
  relevance_threshold: 0.40

digest:
  lookback_days: 2
  max_articles_per_digest: 25

email:
  # Set RESEND_API_KEY environment variable (or GitHub Actions secret).
  # Do NOT paste your key here — leave as null.
  resend_api_key: null
  from_address: "digest@yourdomain.com"
  to_address: "you@example.com"
  subject_prefix: "AI PM Digest"

dashboard:
  output_path: "dashboard/index.html"
  title: "AI PM Daily Digest"
  max_display_articles: 50

summarization:
  enabled: true
  model: "claude-sonnet-4-20250514"
  max_tokens: 2000
  # If the Claude API call fails, fall back to rendering the raw article list
  # in both email and dashboard rather than failing the whole pipeline.
  fallback_to_raw: true

logging:
  level: "INFO"
  # Log file path relative to project root. Set to null to log stdout only.
  file: "data/digest.log"
