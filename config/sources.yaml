    - "AI automation workflow"
    - "AI product management"
    - "prompt engineering workflow"
    - "AI assistant productivity"
    - "LLM agent"
    - "AI task management"
    - "product management tools"
    - "AI knowledge management"
    - "show HN AI productivity"
    
  min_points: 30
  lookback_hours: 72
