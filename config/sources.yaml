# Algolia HN API searches (fetched via httpx, not feedparser)
hacker_news_algolia:
  enabled: true
  keywords:
    - "AI project management"
    - "LLM productivity"
    - "AI product manager"
    - "agentic workflow"
    - "AI tools"
    - "LLM workflow"
